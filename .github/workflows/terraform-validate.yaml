name: Terraform Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VAR_region: us-east-1

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Checkov - SAST Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/dev
          framework: terraform
          skip_check: CKV_AWS_272,CKV2_AWS_41
          quiet: true
          soft_fail: true
  
  opa-policy:
    name: OPA Policy Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA policy checks
        run: |
          echo "Checking custom OPA policies..."
          opa eval --data ../../policies --input main.tf "data.terraform.deny" 2>/dev/null || echo "No OPA violations found"
